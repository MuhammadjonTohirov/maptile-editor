
services:
  db:
    image: postgis/postgis:15-3.5
    platform: linux/amd64
    container_name: map-editor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mapdata
    ports:
      # Bound to loopback so the database is never exposed on a VPS's public
      # interface; only the frontend port is meant to be reachable.
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      # Schema comes exclusively from the migrations job (rule D1).
      - ./db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mapdata"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  db-backup:
    # Same major as the db (postgis/postgis:15) so pg_dump matches the server.
    image: postgres:15-alpine
    container_name: map-editor-db-backup
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: mapdata
      # Nightly by default; keep the newest 7. Override via .env on a deploy.
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
    volumes:
      # Dumps land here (gitignored, rsync-excluded so a deploy never wipes them).
      - ./backups:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/backup-loop.sh"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  migrations:
    image: postgres:15-alpine
    container_name: map-editor-migrations
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: mapdata
    volumes:
      - ./db/migrations:/migrations:ro
    command: ["sh", "/migrations/migrate.sh"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    container_name: map-editor-backend
    # Dev-only auto-reload; the image default runs without it (rule X4).
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      # Loopback only: production traffic reaches the API same-origin via nginx
      # (/api). Direct :8000 is for local dev/docs, never the public interface.
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/mapdata
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # Editor auth — parameterized so a deploy overrides them via .env. Dev
      # defaults keep localhost working; scripts/deploy.sh writes real values.
      # JWT_SECRET signs sessions; ADMIN_* seeds the first admin only while the
      # users table is empty; AUTH_COOKIE_SECURE=true once served over HTTPS.
      - JWT_SECRET=${JWT_SECRET:-dev-insecure-secret-change-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-}
    depends_on:
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      # The bulk-load transform SQL lives in scripts/; the backend runs it.
      - ./scripts:/scripts:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    restart: unless-stopped

  martin:
    image: ghcr.io/maplibre/martin:1.12.0
    platform: linux/amd64
    container_name: map-editor-martin
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/mapdata"
      RUST_LOG: "warn"
    volumes:
      - ./tiles:/tiles:ro
      - ./fonts:/fonts:ro
      - ./martin/config.yaml:/config/config.yaml:ro
    command: ["--config", "/config/config.yaml"]
    depends_on:
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "martin", "--version"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: map-editor-frontend
    ports:
      # Publishing target. Without TLS this is the only public port (deploys set
      # FRONTEND_HOST_PORT=80). Under the `tls` profile the deploy sets it to a
      # loopback bind (127.0.0.1:8080) so Caddy owns 80/443 and reaches the
      # frontend over the internal network instead.
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_started
      martin:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    # Auto-TLS reverse proxy. Dormant unless the `tls` profile is active, which
    # scripts/deploy.sh turns on for an https:// deploy. Obtains/renews a
    # Let's Encrypt cert for $DOMAIN and proxies to the frontend.
    image: caddy:2-alpine
    container_name: map-editor-caddy
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # certificates — must persist across restarts
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  # Caddy's obtained certificates + ACME state; persisted so restarts don't
  # re-request certs and hit Let's Encrypt rate limits.
  caddy_data:
  caddy_config:
