<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Self-hosted Uzbekistan vector map editor">
  <title>Map Tile Editor</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <main id="map" aria-label="Vector map editor"></main>

  <aside class="panel controls" aria-label="Map controls">
    <div class="panel-heading">
      <p class="eyebrow">Self-hosted vector map</p>
      <h1>Map Editor</h1>
      <p id="status" class="status">Loading map…</p>
    </div>

    <section>
      <h2>Editing</h2>
      <div class="button-grid">
        <button id="toggle-editing" class="primary" type="button">Enable editing</button>
        <button id="draw-point" type="button" disabled>Point</button>
        <button id="draw-line" type="button" disabled>Line</button>
        <button id="draw-polygon" type="button" disabled>Polygon</button>
        <button id="draw-rect" type="button" disabled>Rectangle</button>
        <button id="draw-circle" type="button" disabled>Circle</button>
        <button id="select" type="button" disabled>Select / edit</button>
        <button id="undo-edit" type="button" disabled>Undo</button>
        <button id="duplicate-feature" type="button" disabled>Duplicate</button>
        <button id="delete-feature" class="danger" type="button" disabled>Delete selected</button>
      </div>
    </section>

    <section>
      <h2>Find feature</h2>
      <input id="feature-search" list="feature-search-options" type="text" placeholder="Search by name…" autocomplete="off">
      <datalist id="feature-search-options"></datalist>
    </section>

    <section>
      <h2>Layers</h2>
      <label class="switch"><input id="toggle-imports" type="checkbox"><span>Imported OSM overlay</span></label>
      <label class="switch"><input id="toggle-3d" type="checkbox"><span>3D buildings</span></label>
    </section>

    <section>
      <h2>Data</h2>
      <div class="button-grid">
        <button id="load-buildings" type="button">Import buildings</button>
        <button id="load-roads" type="button">Import roads</button>
        <button id="load-streetlights" type="button">Import street lights</button>
        <button id="load-traffic-lights" type="button">Import traffic lights</button>
        <button id="clear-all" class="danger" type="button">Clear editor data</button>
        <button id="my-location" type="button">My location</button>
      </div>
    </section>

    <section>
      <h2>Hidden basemap objects</h2>
      <ul id="hidden-objects" class="hidden-objects"><li class="empty">None</li></ul>
    </section>

    <footer>
      <span>Zoom <strong id="zoom-level">0</strong></span>
      <span>Editor features <strong id="feature-count">0</strong></span>
      <a href="/client.html" target="_blank" rel="noopener">Client view</a>
    </footer>
  </aside>

  <aside id="feature-panel" class="panel feature-panel" hidden aria-label="Feature properties">
    <div class="panel-heading inline-heading">
      <div>
        <p class="eyebrow">Editor feature</p>
        <h2>Properties</h2>
      </div>
      <button id="close-feature" class="icon-button" type="button" aria-label="Close properties">×</button>
    </div>
    <p id="feature-geometry" class="feature-meta"></p>
    <label>Name<input id="feature-name" type="text" autocomplete="off"></label>
    <label>Description<textarea id="feature-description" rows="3"></textarea></label>
    <label>Icon / emoji<input id="feature-icon" type="text" maxlength="8" placeholder="🏠, 🏥, ⛽ …" autocomplete="off"></label>
    <div id="icon-presets" class="icon-presets" aria-label="Quick icons">
      <button type="button">🏠</button><button type="button">🏢</button><button type="button">🏥</button><button type="button">🏫</button>
      <button type="button">🏪</button><button type="button">🍽️</button><button type="button">☕</button><button type="button">⛽</button>
      <button type="button">🅿️</button><button type="button">🕌</button><button type="button">🌳</button><button type="button">⚽</button>
      <button type="button">💡</button><button type="button">🚦</button><button type="button" data-clear aria-label="No icon">✕</button>
    </div>
    <label id="feature-type-label">Feature type<select id="feature-type"></select></label>
    <div id="building-fields" class="property-group" hidden>
      <label>Building type
        <select id="building-type">
          <option value="">Unspecified</option>
          <option value="residential">Residential</option>
          <option value="commercial">Commercial</option>
          <option value="industrial">Industrial</option>
          <option value="office">Office</option>
          <option value="retail">Retail</option>
          <option value="warehouse">Warehouse</option>
        </select>
      </label>
      <label>Building number<input id="building-number" type="text" autocomplete="off"></label>
    </div>
    <div id="road-fields" class="property-group" hidden>
      <label>Road class<input id="road-type" type="text" placeholder="residential, primary…" autocomplete="off"></label>
      <label>Direction
        <select id="road-direction">
          <option value="">Unspecified</option>
          <option value="bidirectional">Bidirectional</option>
          <option value="oneway">One way</option>
          <option value="oneway_reverse">One way (reverse)</option>
        </select>
      </label>
      <div class="field-pair">
        <label>Lanes<input id="lane-count" type="number" min="1" step="1"></label>
        <label>Max speed<input id="max-speed" type="number" min="1" step="1"></label>
      </div>
      <label>Surface<input id="road-surface" type="text" placeholder="asphalt, gravel…" autocomplete="off"></label>
    </div>
    <p class="form-hint">New shapes are saved immediately. Change details or geometry, then save again.</p>
    <button id="save-feature" class="primary" type="button">Save properties</button>
  </aside>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>
