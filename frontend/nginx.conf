server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # The frontend bundle has stable filenames during local development. Always
    # revalidate it so a restarted stack cannot leave an older editor handler
    # running in an already-open browser tab.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        # OSM imports fall back across several Overpass instances and can
        # legitimately exceed the 60s default (rule X5).
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tiles/base/ {
        proxy_pass http://martin:3000/osm_base/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400";
    }

    location /tiles/editor/ {
        proxy_pass http://martin:3000/features/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    # Self-hosted glyphs. The style's glyphs URL is /fonts/{fontstack}/{range};
    # Martin serves the same shape at /font/{fontstack}/{start}-{end}. Fonts are
    # immutable, so cache them like the base tiles.
    location /fonts/ {
        proxy_pass http://martin:3000/font/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400";
    }
}
